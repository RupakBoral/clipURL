version: '3.8'

services:
  app:
    # Builds app container from the Dockerfile
    build: .
    ports: 
    # Maps ports — machine:container
      - '8080:8080'
    env_file:
      - .env
    # Starts Redis before the app
    depends_on:
      - redis
    restart: always
  
  redis:
    image: redis:alpine
    # Starts redis with a password, reads REDIS_PASSWORD from .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    # Docker manages this storage on your machine. w/o this all data will be lost when container stops
    volumes:
      - redis_data/data